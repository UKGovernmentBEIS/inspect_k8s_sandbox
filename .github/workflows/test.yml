name: Test using Pytest

on:
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        helm-version: ["3.20.0", "4.1.0"]
    name: pytest (helm ${{ matrix.helm-version }})
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @devcontainers/cli@v0.83.2
      - name: Create devcontainer override for Helm ${{ matrix.helm-version }}
        run: |
          echo '{"features":{"ghcr.io/devcontainers/features/kubectl-helm-minikube:1":{"helm":"${{ matrix.helm-version }}"}}}' \
            > ${{ runner.temp }}/devcontainer-override.json
      - run: devcontainer up --workspace-folder=. --override-config ${{ runner.temp }}/devcontainer-override.json
      - run: devcontainer exec --workspace-folder=. --override-config ${{ runner.temp }}/devcontainer-override.json helm version --short
      - run: devcontainer exec --workspace-folder=. --override-config ${{ runner.temp }}/devcontainer-override.json uv run pytest -rA -x --color=yes
