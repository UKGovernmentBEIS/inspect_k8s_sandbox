apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ template "agentEnv.fullname" $ -}}-sandbox-egress
  annotations:
    {{- toYaml $.Values.annotations | nindent 4 }}
  labels:
    {{- toYaml $.Values.labels | nindent 4 }}
spec:
  description: |
    Allow egress to:
    - cluster-wide DNS (kube-dns) for certain domains,
    - all Pods in the same agent sandbox,
    - any configured allowDomains, allowEntities, or allowCIDR.
    To prevent DNS exfiltration, only allow DNS lookups for:
    - services in this namespace,
    - allowDomains, or
    - allowEntities.
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      {{- include "agentEnv.selectorLabels" $ | nindent 6 }}
  egress:
    - toEndpoints:
      - matchLabels:
          io.kubernetes.pod.namespace: kube-system
          k8s-app: kube-dns
      - matchLabels:
          io.kubernetes.pod.namespace: kube-system
          k8s-app: node-local-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*.{{ .Release.Namespace }}.svc.cluster.local"
              {{- range .Values.allowDomains }}
              - matchPattern: "{{ . }}"
              {{- end }}
              {{- if or (has "all" .Values.allowEntities) (has "world" .Values.allowEntities) }}
              - matchPattern: "*"
              {{- end }}
    - toEndpoints:
      - matchLabels:
          io.kubernetes.pod.namespace: {{ .Release.Namespace }}
          {{- include "agentEnv.selectorLabels" $ | nindent 10 }}
    {{- if .Values.allowDomains }}
    {{- /* Validate allowDomainsPorts before rendering: no identity-bypassing 80/443, scoped domains must be allowed. */}}
    {{- range $p := .Values.allowDomainsPorts }}
    {{- $proto := $p.protocol | default "ANY" | upper }}
    {{- if and (or (eq (toString $p.port) "80") (eq (toString $p.port) "443")) (ne $proto "UDP") }}
    {{- fail (printf "allowDomainsPorts: port %v protocol %s is not allowed -- TCP/ANY on 80/443 disables the SNI/Host identity check and re-opens the shared-CDN-IP bypass. Use protocol UDP on these ports (e.g. for QUIC/HTTP3), or choose a different port." $p.port $proto) }}
    {{- end }}
    {{- if and $p.domain (not (has $p.domain $.Values.allowDomains)) }}
    {{- fail (printf "allowDomainsPorts: domain %q (port %v) must also appear in allowDomains" $p.domain $p.port) }}
    {{- end }}
    {{- end }}
    - toFQDNs:
    {{- range .Values.allowDomains }}
      - matchPattern: "{{ . }}"
    {{- end }}
      {{- if has "*" .Values.allowDomains }}
      # allowDomains includes "*" (allow all): identity enforcement is moot and
      # serverNames has no allow-all form, so all resolved IPs are permitted.
      {{- else }}
      # Enforce the request identity on the pinned IPs (TLS SNI on 443, HTTP Host
      # on 80) so a pinned IP cannot be reused to reach a different host. Host is a
      # case-insensitive anchored regex built from the glob. Wildcard SNI (443)
      # requires Cilium >= 1.18.
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
          serverNames:
          {{- range .Values.allowDomains }}
            - "{{ . }}"
          {{- end }}
        - ports:
            - port: "80"
              protocol: TCP
          rules:
            http:
            {{- range .Values.allowDomains }}
              - host: "(?i)^{{ . | replace "." "[.]" | replace "*" "[^.]+" }}(:[0-9]+)?$"
            {{- end }}
        {{- /* Extra ports without a domain apply to every allowDomains IP (IP-pinned, no identity check). */}}
        {{- $hasUnscoped := false }}
        {{- range .Values.allowDomainsPorts }}
        {{- if not .domain }}{{ $hasUnscoped = true }}{{ end }}
        {{- end }}
        {{- if $hasUnscoped }}
        - ports:
          {{- range .Values.allowDomainsPorts }}
          {{- if not .domain }}
            - port: "{{ .port }}"
              protocol: {{ .protocol | default "ANY" | upper }}
          {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- /* Extra ports with a domain are scoped to that domain only, via their own rule. */}}
    {{- range $p := .Values.allowDomainsPorts }}
    {{- if $p.domain }}
    - toFQDNs:
      - matchPattern: "{{ $p.domain }}"
      toPorts:
        - ports:
            - port: "{{ $p.port }}"
              protocol: {{ $p.protocol | default "ANY" | upper }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- with .Values.allowEntities }}
    - toEntities:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.allowCIDR }}
    - toCIDR:
      {{- toYaml . | nindent 6 }}
    {{- end }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ template "agentEnv.fullname" $ -}}-sandbox-default-deny-ingress
  annotations:
    {{- toYaml $.Values.annotations | nindent 4 }}
  labels:
    {{- toYaml $.Values.labels | nindent 4 }}
spec:
  description: Default deny ingress. Allow other policies to be more specific.
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      {{- include "agentEnv.selectorLabels" $ | nindent 6 }}
  ingress:
    - {}
{{- if .Values.networks }}
  {{- range $svcName, $svc := .Values.services }}
    {{- if $svc.networks }}
      {{- range $net := $svc.networks }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ template "agentEnv.fullname" $ }}-svc-{{ $svcName }}-{{ $net }}-ingress
  annotations:
    {{- toYaml $.Values.annotations | nindent 4 }}
  labels:
    {{- toYaml $.Values.labels | nindent 4 }}
spec:
  description: |
    Allow ingress to workload "{{ $svcName }}" from same sandbox on network "{{ $net }}".
    If ports are specified, only those ports are exposed; otherwise all ports are allowed.
    Always allow ICMP echo requests (ping)
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
      {{- include "agentEnv.selectorLabels" $ | nindent 6 }}
      inspect/service: {{ $svcName }}
      aisi.gov.uk/network-{{ $net }}: "true"
  ingress:
    - fromEndpoints:
      - matchLabels:
          io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
          {{- include "agentEnv.selectorLabels" $ | nindent 10 }}
          aisi.gov.uk/network-{{ $net }}: "true"
      {{- if $svc.ports }}
      toPorts:
        - ports:
{{ include "agentEnv.servicePortsListFor" (dict "svc" $svc) | nindent 12 }}
      {{- end }}
    - fromEndpoints:
      - matchLabels:
          io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
          {{- include "agentEnv.selectorLabels" $ | nindent 10 }}
          aisi.gov.uk/network-{{ $net }}: "true"
      icmps:
        - fields:
          - type: 8
            family: IPv4
          - type: 128
            family: IPv6
      {{- end }}
    {{- else }}
    {{- /* If no network fallback to default rule (no ingress) */}}
    {{- end }}
  {{- end }}
{{- else }}
  {{- /* No global networks: allow same-sandbox ingress per service (no network scoping) */}}
  {{- range $svcName, $svc := .Values.services }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ template "agentEnv.fullname" $ }}-svc-{{ $svcName }}-ingress
  annotations:
    {{- toYaml $.Values.annotations | nindent 4 }}
  labels:
    {{- toYaml $.Values.labels | nindent 4 }}
spec:
  description: |
    Allow ingress to workload "{{ $svcName }}" from same sandbox.
    If ports are specified, only those ports are exposed; otherwise all ports are allowed.
    Always allow ICMP echo requests (ping).
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
      {{- include "agentEnv.selectorLabels" $ | nindent 6 }}
      inspect/service: {{ $svcName }}
  ingress:
    - fromEndpoints:
      - matchLabels:
          io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
          {{- include "agentEnv.selectorLabels" $ | nindent 10 }}
      {{- if $svc.ports }}
      toPorts:
        - ports:
{{ include "agentEnv.servicePortsListFor" (dict "svc" $svc) | nindent 12 }}
      {{- end }}
    - fromEndpoints:
      - matchLabels:
          io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
          {{- include "agentEnv.selectorLabels" $ | nindent 10 }}
      icmps:
        - fields:
          - type: 8
            family: IPv4
          - type: 128
            family: IPv6
  {{- end }}
{{- end }}
{{- range $svcName, $svc := .Values.services }}
{{- if $svc.networkIsolated }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ template "agentEnv.fullname" $ }}-svc-{{ $svcName }}-isolate
  annotations:
    {{- toYaml $.Values.annotations | nindent 4 }}
  labels:
    {{- toYaml $.Values.labels | nindent 4 }}
spec:
  description: |
    Deny all ingress and egress for isolated service "{{ $svcName }}" (network_mode: none).
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
      {{- include "agentEnv.selectorLabels" $ | nindent 6 }}
      inspect/service: {{ $svcName }}
  ingressDeny:
    - fromEntities:
        - all
  egressDeny:
    - toEntities:
        - all
{{- end }}
{{- end }}
